id: PY-SUBPROC-001
language: python
severity: critical
title: subprocess call with shell=True
patterns:
  - "subprocess\\.(?:run|call|Popen|check_call|check_output)\\([^)]*shell\\s*=\\s*True"
  - "os\\.(?:system|popen)\\s*\\("
description: >
  shell=True (or os.system/os.popen) runs a command through the system
  shell, so any untrusted data interpolated into the command string can
  inject arbitrary shell commands.
recommendation: >
  Pass the command as a list of arguments with shell=False (the default),
  and never build the command string via f-strings or concatenation with
  user-controlled data.
category: command-injection
