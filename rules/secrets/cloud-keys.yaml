id: SECRET-AWS-001
language: any
severity: critical
title: Hardcoded AWS access key ID
patterns:
  - "\\b(AKIA|ASIA)[A-Z0-9]{16}\\b"
description: >
  Matches the fixed-prefix format of AWS access key IDs. Presence of this
  pattern strongly indicates a hardcoded, potentially live, AWS credential.
recommendation: >
  Revoke the key in the AWS IAM console immediately, then switch to an
  instance role, environment-injected credentials, or a secrets manager.
category: hardcoded-secret
