id: SECRET-GENERIC-001
language: any
severity: critical
title: Hardcoded credential or API key
patterns:
  - "(?i)(api[_-]?key|secret|password|passwd|token)\\s*[:=]\\s*[\"'][A-Za-z0-9/_\\-\\.]{8,}[\"']"
description: >
  A string literal assigned to a variable or config key named like a
  credential (password, secret, api_key, token, ...). Hardcoded secrets in
  source control are a common root cause of breaches, since anyone with
  repository access (including CI logs, forks, backups) gets the secret.
recommendation: >
  Move the value to an environment variable or a secrets manager, rotate
  the exposed credential immediately, and add the file pattern to
  pre-commit secret scanning.
category: hardcoded-secret
